x-vpanel-build-args: &vpanel-build-args
  VERSION: ${VERSION:-dev}
  BUILD_TIME: ${BUILD_TIME:-unknown}
  GIT_COMMIT: ${GIT_COMMIT:-unknown}
  ALPINE_MIRROR: ${ALPINE_MIRROR:-mirrors.aliyun.com}
  NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com/}
  GO_PROXY: ${GO_PROXY:-https://goproxy.cn|direct}

x-vpanel-environment: &vpanel-environment
  V_SERVER_HOST: 0.0.0.0
  V_SERVER_PORT: 8080
  V_SERVER_MODE: ${V_SERVER_MODE:-release}
  V_SERVER_PUBLIC_URL: ${V_SERVER_PUBLIC_URL:-}
  V_SERVER_BASE_URL: ${V_SERVER_BASE_URL:-}
  V_SERVER_TLS_CERT: ${V_SERVER_TLS_CERT:-}
  V_SERVER_TLS_KEY: ${V_SERVER_TLS_KEY:-}
  V_SERVER_STATIC_PATH: /app/web/dist
  VPANEL_CONFIG_PATH: ${VPANEL_CONFIG_PATH:-/app/configs/config.yaml}
  VPANEL_DATA_DIR: ${VPANEL_DATA_DIR:-/app/data}
  VPANEL_LOG_DIR: ${VPANEL_LOG_DIR:-/app/logs}
  VPANEL_XRAY_DIR: ${VPANEL_XRAY_DIR:-/app/xray}
  V_DB_PATH: ${V_DB_PATH:-/app/data/v.db}
  V_JWT_SECRET: ${V_JWT_SECRET:-change-me-in-production}
  V_ADMIN_USER: ${V_ADMIN_USER:-admin}
  V_ADMIN_PASS: ${V_ADMIN_PASS:-admin123}
  V_LOG_LEVEL: ${V_LOG_LEVEL:-info}
  V_LOG_FORMAT: ${V_LOG_FORMAT:-json}
  V_PAYMENT_ALIPAY_ENABLED: ${V_PAYMENT_ALIPAY_ENABLED:-false}
  V_PAYMENT_ALIPAY_APP_ID: ${V_PAYMENT_ALIPAY_APP_ID:-}
  V_PAYMENT_ALIPAY_PRIVATE_KEY: ${V_PAYMENT_ALIPAY_PRIVATE_KEY:-}
  V_PAYMENT_ALIPAY_PUBLIC_KEY: ${V_PAYMENT_ALIPAY_PUBLIC_KEY:-}
  V_PAYMENT_ALIPAY_NOTIFY_URL: ${V_PAYMENT_ALIPAY_NOTIFY_URL:-}
  V_PAYMENT_ALIPAY_RETURN_URL: ${V_PAYMENT_ALIPAY_RETURN_URL:-}
  V_PAYMENT_ALIPAY_SANDBOX: ${V_PAYMENT_ALIPAY_SANDBOX:-false}
  V_PAYMENT_WECHAT_ENABLED: ${V_PAYMENT_WECHAT_ENABLED:-false}
  V_PAYMENT_WECHAT_APP_ID: ${V_PAYMENT_WECHAT_APP_ID:-}
  V_PAYMENT_WECHAT_MCH_ID: ${V_PAYMENT_WECHAT_MCH_ID:-}
  V_PAYMENT_WECHAT_API_KEY: ${V_PAYMENT_WECHAT_API_KEY:-}
  V_PAYMENT_WECHAT_NOTIFY_URL: ${V_PAYMENT_WECHAT_NOTIFY_URL:-}
  V_PAYMENT_WECHAT_SANDBOX: ${V_PAYMENT_WECHAT_SANDBOX:-false}
  VPANEL_ACME_AUTO_INSTALL: ${VPANEL_ACME_AUTO_INSTALL:-0}
  ACME_EMAIL: ${ACME_EMAIL:-}
  TZ: ${TZ:-UTC}

x-vpanel-volumes: &vpanel-volumes
  - v-panel-config:/app/configs
  - v-panel-data:${VPANEL_DATA_DIR:-/app/data}
  - v-panel-logs:${VPANEL_LOG_DIR:-/app/logs}
  - v-panel-xray:${VPANEL_XRAY_DIR:-/app/xray}
  - ${VPANEL_CERT_DIR:-./certs}:/app/certs:ro

x-vpanel-healthcheck: &vpanel-healthcheck
  test:
    [
      "CMD-SHELL",
      "scheme=http; extra=''; if [ -n \"$$V_SERVER_TLS_CERT\" ] && [ -n \"$$V_SERVER_TLS_KEY\" ]; then scheme=https; extra='--no-check-certificate'; fi; wget $$extra --no-verbose --tries=1 --spider \"$$scheme://127.0.0.1:8080/health\"",
    ]
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 10s

services:
  v-panel:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
      target: runtime
      args: *vpanel-build-args
    image: v-panel:${VERSION:-latest}
    container_name: v-panel
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "${V_SERVER_PORT:-8080}:8080"
    environment: *vpanel-environment
    volumes: *vpanel-volumes
    healthcheck: *vpanel-healthcheck
    networks:
      - v-panel-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        compress: "true"

volumes:
  v-panel-config:
    name: v-panel-config
  v-panel-data:
    name: v-panel-data
  v-panel-logs:
    name: v-panel-logs
  v-panel-xray:
    name: v-panel-xray

networks:
  v-panel-network:
    name: v-panel-network
    driver: bridge
